    <title>화학 반응 속도</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.0/chart.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
        }
        #simulator {
            width: 600px;
            height: 300px;
            background-color: #fff;
            border: 1px solid #ccc;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        #beaker {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 220px;
            border: 2px solid #000;
            border-top: none;
            border-radius: 0 0 20px 20px;
            overflow: hidden;
        }
        #beaker::before {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 140px;
            background-color: #ffff99;
            opacity: 0.5;
        }
        #beaker::after {
            content: "HCl(aq)";
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translatex(-50%);
            font-size: 24px;
            color: #666;
        }
        #magnesium {
            width: 50px;
            height: 10px;
            background-color: #c0c0c0;
            position: absolute;
            bottom: 30px;
            left: 275px;
        }
        #magnesium::after {
    content: "Mg(s)";
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 15px;
    color: #333;
    white-space: nowrap;
}
        #bubbles {
            position: absolute;
            bottom: 40px;
            left: 250px;
            width: 100px;
            height: 200px;
            overflow: hidden;
        }
        .bubble {
            position: absolute;
            background-color: #fff;
            border-radius: 50%;
            opacity: 0.7;
        }
        #controls {
            margin-bottom: 20px;
        }
        #chart {
            width: 800px;
            height: 400px;
        }
        select, button {
            margin: 5px;
            padding: 5px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>화학 반응 속도(Mg+HCl)</h1>
    <div id="simulator">
        <div id="beaker"></div>
        <div id="magnesium"></div>
        <div id="bubbles"></div>
    </div>
    <div id="controls">
        HCl 농도(%):
        <select id="concentration">
            <option value="5">5%</option>
            <option value="10">10%</option>
            <option value="15">15%</option>
            <option value="20">20%</option>
        </select>
        Mg 질량(g):
        <select id="mass">
            <option value="1">1g</option>
            <option value="2">2g</option>
        </select>
        <button onclick="startSimulation()">Start</button>
        <button onclick="resetSimulation()">Reset</button>
    </div>
    
    <canvas id="chart"></canvas>

    <script>
        let chart;
        let simulations = {};

        function startSimulation() {
    const concentration = parseInt(document.getElementById('concentration').value);
    const mass = parseInt(document.getElementById('mass').value);
    const key = `${concentration}-${mass}`;

    if (simulations[key]) {
        return;
    }

    if (!chart) {
        setupChart();
    }

    simulations[key] = {
        startTime: Date.now(),
        concentration: concentration,
        mass: mass,
        data: []
    };

    animate();
}

        function resetSimulation() {
    clearInterval(animationInterval);
    document.getElementById('bubbles').innerHTML = '';
}
function animate() {
    let activeSims = false;

    for (let key in simulations) {
        const sim = simulations[key];
        const currentTime = (Date.now() - sim.startTime) / 1000;
        if (currentTime <= 30) {
            const volume = calculateVolume(currentTime, sim.concentration, sim.mass);
            updateChart(currentTime, volume, sim.concentration, sim.mass);
            createBubble(volume);
            activeSims = true;
        }
    }

    if (activeSims) {
        requestAnimationFrame(animate);
    }
}

        function calculateVolume(time, concentration, mass) {
            const maxVolume = mass === 1 ? 10 : 20; // 10mL for 1g, 20mL for 2g
            const rate = concentration / 100; // Higher concentration means faster reaction
            return maxVolume * (1 - Math.exp(-rate * time));
        }

        function createBubble(volume) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const size = Math.random() * 10 + 5;
            bubble.style.width = size + 'px';
            bubble.style.height = size + 'px';
            bubble.style.left = Math.random() * 100 + 'px';
            bubble.style.bottom = '0px';
            document.getElementById('bubbles').appendChild(bubble);

            const animation = bubble.animate([
                { bottom: '0px', opacity: 0.7 },
                { bottom: '200px', opacity: 0 }
            ], {
                duration: 2000,
                easing: 'ease-out'
            });

            animation.onfinish = () => bubble.remove();
        }

        function setupChart() {
            const ctx = document.getElementById('chart').getContext('2d');
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    datasets: []
                },
                options: {
                    scales: {
                        x: {
                            type: 'linear',
                            position: 'bottom',
                            title: {
                                display: true,
                                text: 'Time (s)'
                            },
                            max: 30
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'H2 Volume (mL)'
                            },
                            max: 20
                        }
                    },
                    animation: false
                }
            });
        }

        function resetSimulation() {
    simulations = {};
    if (chart) {
        chart.data.datasets = [];
        chart.update();
    }
    document.getElementById('bubbles').innerHTML = '';
}

        function updateChart(time, volume, concentration, mass) {
            let dataset = chart.data.datasets.find(ds => ds.label === `${concentration}% - ${mass}g`);
            if (!dataset) {
                dataset = {
                    label: `${concentration}% - ${mass}g`,
                    data: [],
                    borderColor: `hsl(${concentration * 10}, ${mass * 50}%, 50%)`,
                    fill: false
                };
                chart.data.datasets.push(dataset);
            }
            dataset.data.push({x: time, y: volume});
            chart.update();
        }

        setupChart();
    </script>
</body></html>
