<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이온 결합 배틀 - 난이도 조절 모드</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        .container { max-width: 750px; width: 100%; position: relative; }
        
        /* 가이드 및 난이도 선택 화면 */
        #guide-screen { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .guide-box { text-align: left; background: #f8f9fa; padding: 20px; border-radius: 12px; margin: 20px 0; border-left: 5px solid #3498db; }
        
        .difficulty-selector { display: flex; justify-content: center; gap: 15px; margin: 30px 0; }
        .diff-btn { padding: 15px 30px; border: 2px solid #dee2e6; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.3s; background: white; }
        .diff-btn:hover { transform: translateY(-3px); }
        .diff-btn.selected { border-color: #3498db; background-color: #e3f2fd; color: #3498db; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.2); }
        .diff-btn[data-level="상"] { color: #e74c3c; }
        .diff-btn[data-level="중"] { color: #f39c12; }
        .diff-btn[data-level="하"] { color: #27ae60; }

        /* 가이드 화면 하단 버튼 배치를 위한 래퍼 */
        .guide-controls { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 10px; }
        .start-btn { padding: 18px 60px; background: #3498db; color: white; border: none; border-radius: 10px; font-size: 1.3rem; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%; max-width: 400px; box-sizing: border-box; }
        .start-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* 게임 화면 스타일 */
        #game-screen { display: none; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .battle-info { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .player-status { flex: 1; padding: 15px; border-radius: 12px; background: #f8f9fa; border: 2px solid #dee2e6; margin: 0 5px; }
        .player-status.active { border-color: #3498db; background-color: #e3f2fd; }
        .player-status.ai-active { border-color: #e74c3c; background-color: #ffebee; }

        .timer-circle { font-size: 2.5rem; font-weight: bold; color: #e67e22; margin: 10px 0; height: 60px; font-family: 'Courier New', monospace; }
        .table-zone { min-height: 160px; background: #f1f3f5; border: 3px dashed #bdc3c7; border-radius: 15px; margin: 20px 0; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; padding: 10px; }
        
        .card { width: 60px; height: 85px; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; transition: 0.2s; color: white; margin: 5px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); font-size: 0.85rem; border: 2px solid rgba(0,0,0,0.1); }
        .card sup { font-size: 0.6rem; vertical-align: top; }
        .card.selected { transform: translateY(-10px); border-color: #2c3e50; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .card.ai-card { border-color: #e74c3c; animation: pop 0.3s; }

        .ion-Na { background: #ff7675; } .ion-Mg { background: #fab1a0; color: #333; }
        .ion-Cl { background: #74b9ff; } .ion-O  { background: #a29bfe; }

        .msg-box { height: 85px; font-weight: bold; font-size: 1.1rem; margin: 10px 0; color: #2c3e50; display: flex; align-items: center; justify-content: center; border-radius: 10px; background: #fdfdfd; padding: 0 20px; line-height: 1.4; border: 1px solid #eee; }
        .msg-box sup { font-size: 0.8rem; vertical-align: super; }
        .my-hand { display: flex; flex-wrap: wrap; justify-content: center; background: #fff; padding: 15px; border-radius: 15px; border: 2px solid #3498db; min-height: 120px; }
        
        /* 게임 화면 하단 버튼 구조 및 홈버튼 스타일 */
        .action-controls { display: flex; gap: 10px; margin-top: 20px; }
        .btn-submit { padding: 15px 40px; background: #3498db; color: white; border: none; border-radius: 10px; font-size: 1.1rem; cursor: pointer; font-weight: bold; flex: 3; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; opacity: 0.6; }
        .error-text { color: #e74c3c; }

        /* 공통 홈으로 버튼 스타일 */
        .home-btn { padding: 15px 30px; background: #2c3e50; color: white; border: none; border-radius: 10px; font-size: 1.1rem; cursor: pointer; font-weight: bold; transition: 0.3s; box-sizing: border-box; }
        .home-btn:hover { background: #1a252f; transform: translateY(-2px); }
        #guide-screen .home-btn { width: 100%; max-width: 400px; padding: 15px 60px; font-size: 1.2rem; }
        #game-screen .home-btn { flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <div id="guide-screen">
        <h1>🧪 이온 결합 배틀</h1>
        <p>전하의 합을 0으로 만들어 화합물을 완성하세요!</p>
        
        <div class="difficulty-selector">
            <button class="diff-btn" data-level="하" data-time="4.0" onclick="selectDifficulty(this)">하 (4초)</button>
            <button class="diff-btn" data-level="중" data-time="3.0" onclick="selectDifficulty(this)">중 (3초)</button>
            <button class="diff-btn" data-level="상" data-time="2.0" onclick="selectDifficulty(this)">상 (2초)</button>
        </div>

        <div class="guide-box">
            <p>• <b>공격:</b> 이온 카드 1장만 낼 수 있습니다.<br>
               • <b>결합:</b> 이온 결합 화합물이 되도록 카드를 선택하세요.<br>
               • <b>실패:</b> 제한 시간 초과나 오답 제출 시 AI가 역습합니다.</p>
        </div>

        <div class="guide-controls">
            <button class="start-btn" id="game-start-btn" disabled onclick="startGame()">난이도를 선택해 주세요</button>
            <button class="home-btn" onclick="goHome()">홈으로</button>
        </div>
    </div>

    <div id="game-screen">
        <div class="battle-info">
            <div class="player-status" id="stat-user"><b>나</b>: <span id="user-count">12</span>장</div>
            <div class="player-status" id="stat-ai"><b>상대</b>: <span id="ai-count">12</span>장</div>
        </div>
        <div class="timer-circle" id="timer">READY</div>
        <div class="table-zone" id="table"></div>
        <div class="msg-box" id="msg">배틀 준비 중...</div>
        <div class="my-hand" id="my-hand"></div>
        
        <div class="action-controls">
            <button class="btn-submit" id="submit-btn" onclick="handleUserAction()">카드 제출</button>
            <button class="home-btn" onclick="goHome()">홈으로</button>
        </div>
    </div>
</div>

<script>
    const ionTypes = [
        { id: 'Na', name: 'Na<sup>+</sup>', charge: 1 }, 
        { id: 'Mg', name: 'Mg<sup>2+</sup>', charge: 2 },
        { id: 'Cl', name: 'Cl<sup>-</sup>', charge: -1 }, 
        { id: 'O', name: 'O<sup>2-</sup>', charge: -2 }
    ];

    let userHand = [], aiHand = [], tableCards = [], selectedIndices = new Set();
    let timeLeft = 3.0, maxTime = 3.0, timerId = null, currentTurn = 'user', isProcessing = false;

    /* 홈으로 이동 함수 추가 */
    function goHome() {
        if (confirm("초기화면(index.html)으로 이동하시겠습니까? 진행 중인 게임은 저장되지 않습니다.")) {
            window.location.href = 'index.html';
        }
    }

    function selectDifficulty(btn) {
        document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        maxTime = parseFloat(btn.dataset.time);
        
        const startBtn = document.getElementById('game-start-btn');
        startBtn.disabled = false;
        startBtn.innerText = `게임 시작 (${btn.dataset.level} 난이도)`;
    }

    function startGame() {
        document.getElementById('guide-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'block';
        initGame();
    }

    function initGame() {
        let deck = [];
        ionTypes.forEach(ion => { for(let i=0; i<10; i++) deck.push({...ion}); });
        deck.sort(() => Math.random() - 0.5);
        userHand = deck.splice(0, 12);
        aiHand = deck.splice(0, 12);
        updateMsg(`배틀 시작! 공격할 이온 1장을 선택하세요. (제한시간: ${maxTime}초)`);
        render();
    }

    function render() {
        document.getElementById('user-count').innerText = userHand.length;
        document.getElementById('ai-count').innerText = aiHand.length;
        document.getElementById('stat-user').className = `player-status ${currentTurn === 'user' ? 'active' : ''}`;
        document.getElementById('stat-ai').className = `player-status ${currentTurn === 'ai' ? 'ai-active' : ''}`;
        document.getElementById('submit-btn').disabled = isProcessing || (currentTurn === 'ai' && tableCards.length === 0);

        const handDiv = document.getElementById('my-hand');
        handDiv.innerHTML = '';
        userHand.forEach((card, idx) => {
            const div = document.createElement('div');
            div.className = `card ion-${card.id} ${selectedIndices.has(idx) ? 'selected' : ''}`;
            div.innerHTML = `<span>${card.name}</span>`;
            div.onclick = () => { if(!isProcessing) { selectedIndices.has(idx) ? selectedIndices.delete(idx) : selectedIndices.add(idx); render(); } };
            handDiv.appendChild(div);
        });

        const tableDiv = document.getElementById('table');
        tableDiv.innerHTML = tableCards.length === 0 ? '<div style="color:#aaa">결합 공간</div>' : '';
        tableCards.forEach(card => {
            const div = document.createElement('div');
            div.className = `card ion-${card.id} ${card.fromAi ? 'ai-card' : ''}`;
            div.innerHTML = `<span>${card.name}</span>`;
            tableDiv.appendChild(div);
        });
    }

    function handleUserAction() {
        if (selectedIndices.size === 0 || isProcessing) return;

        const chosenCards = Array.from(selectedIndices).map(idx => userHand[idx]);
        const chosenCharge = chosenCards.reduce((s, c) => s + c.charge, 0);
        const tableCharge = tableCards.reduce((s, c) => s + c.charge, 0);

        if (currentTurn === 'user' && tableCards.length === 0) {
            if (selectedIndices.size > 1 || chosenCharge === 0) {
                updateMsg("<span class='error-text'>🚫 공격 규칙 위반!</span><br>1장의 이온만 내야 하며 완성된 상태로 낼 수 없습니다.");
                selectedIndices.clear(); render(); return;
            }
            isProcessing = true;
            updateMsg("이온을 제시했습니다. 상대의 가로채기를 기다립니다.");
            moveUserCardsToTable(); render();
            isProcessing = false;
            startTimer(aiCounterAction);
        } else {
            isProcessing = true; stopTimer();
            if (tableCharge + chosenCharge === 0) {
                updateMsg("✨ 결합 성공! 화합물을 제거하고 공격권을 얻습니다.");
                removeUserCards(); tableCards = []; render();
                setTimeout(() => { isProcessing = false; if(!checkGameOver()) switchTurn(); }, 1500);
            } else {
                updateMsg("<span class='error-text'>❌ 결합 실패!</span><br>상대방이 즉시 결합을 완성하며 턴을 뺏습니다.");
                selectedIndices.clear(); render();
                setTimeout(() => aiCounterAction(), 1000);
            }
        }
    }

    function startTimer(callback) {
        timeLeft = maxTime;
        clearInterval(timerId);
        timerId = setInterval(() => {
            timeLeft -= 0.1;
            document.getElementById('timer').innerText = timeLeft.toFixed(1) + "s";
            if (timeLeft <= 0) { stopTimer(); callback(); }
        }, 100);
    }

    function stopTimer() { clearInterval(timerId); document.getElementById('timer').innerText = "STOP"; }

    function aiCounterAction() {
        isProcessing = true;
        const tableCharge = tableCards.reduce((s, c) => s + c.charge, 0);
        let found = findCombination(aiHand, tableCharge);
        if (found) {
            found.cards.forEach(c => tableCards.push({...c, fromAi: true}));
            render();
            updateMsg(`⏰ AI 역습!   <b>${found.names}</b>를 내어 완성했습니다.`);
            setTimeout(() => {
                aiHand = found.newHand; tableCards = []; isProcessing = false;
                switchTurn();
            }, 2000);
        } else {
            updateMsg("상대가 대응하지 못해 기회가 다시 돌아왔습니다.");
            tableCards = []; isProcessing = false;
            setTimeout(switchTurn, 1000);
        }
    }

    function switchTurn() {
        currentTurn = (currentTurn === 'user') ? 'ai' : 'user';
        if (currentTurn === 'ai') startAiTurn();
        else { updateMsg("당신의 공격 차례입니다! 카드 1장을 내세요."); render(); }
    }

    function startAiTurn() {
        if (checkGameOver()) return;
        updateMsg("상대가 이온을 고르는 중..."); render();
        setTimeout(() => {
            const card = aiHand.splice(Math.floor(Math.random() * aiHand.length), 1)[0];
            tableCards.push({...card, fromAi: true});
            updateMsg(`상대가 <b>${card.name}</b>를 던졌습니다! ${maxTime}초 안에 방어하세요!`);
            render(); startTimer(aiCounterAction);
        }, 1500);
    }

    function findCombination(hand, currentCharge) {
        if (currentCharge === 0) return null;
        for (let i = 0; i < hand.length; i++) {
            if (currentCharge + hand[i].charge === 0) {
                let res = { cards: [hand[i]], names: hand[i].name, newHand: [...hand] };
                res.newHand.splice(i, 1); return res;
            }
            for (let j = i + 1; j < hand.length; j++) {
                if (currentCharge + hand[i].charge + hand[j].charge === 0) {
                    let res = { cards: [hand[i], hand[j]], names: hand[i].name + ", " + hand[j].name, newHand: [...hand] };
                    res.newHand.splice(j, 1); res.newHand.splice(i, 1); return res;
                }
            }
        }
        return null;
    }

    function removeUserCards() {
        const indices = Array.from(selectedIndices).sort((a,b) => b-a);
        indices.forEach(idx => userHand.splice(idx, 1));
        selectedIndices.clear();
    }

    function moveUserCardsToTable() {
        const indices = Array.from(selectedIndices).sort((a,b) => b-a);
        indices.forEach(idx => { let c = userHand.splice(idx, 1)[0]; c.fromAi = false; tableCards.push(c); });
        selectedIndices.clear();
    }

    function updateMsg(m) { document.getElementById('msg').innerHTML = m; }

    function checkGameOver() {
        if (userHand.length === 0) { alert("🎉 승리! 당신은 이온 결합의 달인입니다."); location.reload(); return true; }
        if (aiHand.length === 0) { alert("💀 패배! AI가 먼저 모든 카드를 사용했습니다."); location.reload(); return true; }
        return false;
    }
</script>

</body>
</html>
